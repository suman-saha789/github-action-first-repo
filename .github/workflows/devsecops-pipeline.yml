#This file will create pipeline of all the files eg:code-quality,dependency-scan,dploy-to-server,docker-lint,image-scan

name: DevSecOps end to end Pipeline

on:
    workflow_dispatch:

jobs:
    #CI (continuous integration with security)
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secrets-scan:
        uses: ./.github/workflows/secrets-scan.yml
        secrets: inherit

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/docker-lint.yml

   #Build once the security scans are complete     

    doker-build:
        needs: [code-quality, dependency-scan, docker-scan]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

    trivy:
        needs: [doker-build]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    #Deploy to Production
    deploy:
        needs: [trivy]
        uses: ./.github/workflows/deploy-to-server.yml
        secrets: inherit


    