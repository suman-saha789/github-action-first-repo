# uses Trivy image scanner for CVEs(common vulnarebilities and exposure)to scan Docker image
name: image scaner

on:
    workflow_call:

jobs:
    image-scaner:
        runs-on: ubuntu-latest

        steps:
            - name: login to dockerhub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/github-actions-app:${{ github.sha}}
                severity: 'CRITICAL'
                exit-code: '1'


