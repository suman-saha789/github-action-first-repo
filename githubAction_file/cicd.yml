#This is name of the work flow
name: CICD

#This is Manual work flow and need to click
on:
  workflow_dispatch: 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code build
        run: echo "code build"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "Test the code"
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: deploy the code
        run: echo "code deployed"
